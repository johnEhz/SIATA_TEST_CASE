version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: logistic_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: logistic_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d logistic_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: logistic_api
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgres://postgres:postgres@db:5432/logistic_db
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
