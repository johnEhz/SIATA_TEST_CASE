version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: logistic_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: logistic_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d logistic_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./app_logistic_api
    container_name: logistic_api
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./app_logistic_api:/app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgres://postgres:postgres@db:5432/logistic_db
      - DEBUG=True
    depends_on:
      db:
        condition: service_healthy

  client:
    build: ./app_logistic_client
    container_name: logistic_client
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api
    depends_on:
      - api

volumes:
  postgres_data:
